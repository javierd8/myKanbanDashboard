<!DOCTYPE html>
<html lang="en" x-data="kanbanApp()" :class="{ 'dark': darkMode }" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .theme-transition { transition: background-color 0.3s, color 0.3s; }
        .column-ghost { opacity: 0.4; border: 2px dashed #6366f1 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:text-slate-100 font-sans antialiased theme-transition dark:bg-slate-950 min-h-screen">

    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex flex-wrap justify-between items-center sticky top-0 z-20 gap-4">
        <div class="flex items-center gap-4">
            <img src="https://media.tenor.com/796l9K6p9mAAAAAC/にのまえいなにす-ホロライブ.gif" alt="Ina" class="w-10 h-10 rounded-lg shadow-sm">
            <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">Kanban Dashboard</h1>
            <button @click="resetToDefault()" class="text-[10px] font-bold text-slate-400 hover:text-orange-500 uppercase border border-slate-200 dark:border-slate-700 px-2 py-1 rounded">Reset Columns</button>
        </div>

        <div class="flex flex-1 max-w-md mx-4">
            <input type="text" x-model="searchQuery" placeholder="Filter tasks..." class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg px-4 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div class="flex items-center gap-4">
            <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span x-show="!darkMode">🌙</span><span x-show="darkMode" x-cloak>☀️</span>
            </button>
            <div class="flex gap-2 border-l dark:border-slate-700 pl-4">
                <button @click="addColumn()" class="px-3 py-1 bg-emerald-600 text-white rounded-md text-sm font-medium hover:bg-emerald-700">+ Column</button>
                <button @click="exportData()" class="px-3 py-1 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700">Export</button>
                <label class="cursor-pointer px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-md text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700">
                    Import <input type="file" class="hidden" @change="importData($event)">
                </label>
            </div>
        </div>
    </header>

    <main class="p-6 h-[calc(100vh-80px)] overflow-x-auto flex gap-6 items-start">
        <template x-for="(column, colIndex) in columns" :key="column.id">
            <div class="flex-shrink-0 w-80 bg-slate-200/50 dark:bg-slate-900/40 rounded-xl p-4 flex flex-col max-h-full border border-transparent dark:border-slate-800"
                 draggable="true"
                 @dragstart="colDragStart($event, colIndex)"
                 @dragover.prevent
                 @drop="colDrop($event, colIndex)">
                
                <div class="flex justify-between items-center mb-4 cursor-move">
                    <div class="flex flex-col gap-1 flex-1 mr-2">
                        <input type="text" x-model="column.name" @change="save()" 
                               class="bg-transparent border-none font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider text-sm focus:ring-0 w-full p-0">
                        <div class="flex gap-2">
                            <button @click="sortColumn(colIndex)" class="text-[9px] bg-slate-200 dark:bg-slate-700 px-1 rounded hover:bg-indigo-500 hover:text-white transition-colors">SORT</button>
                            <button @click="confirmClearColumn(colIndex)" class="text-[9px] text-slate-400 hover:text-orange-500 font-bold uppercase">Clear</button>
                            <button @click="confirmDeleteColumn(colIndex)" class="text-[9px] text-slate-400 hover:text-red-500 font-bold uppercase">Delete</button>
                        </div>
                    </div>
                    <span class="bg-white dark:bg-slate-800 px-2 py-0.5 rounded text-xs font-bold text-slate-400 border dark:border-slate-700" x-text="filteredTasks(column.tasks).length"></span>
                </div>

                <div class="space-y-3 overflow-y-auto flex-grow min-h-[100px]" 
                     @dragover.prevent.stop 
                     @drop.stop="drop($event, colIndex)">
                    <template x-for="(task, taskIndex) in filteredTasks(column.tasks)" :key="task.id">
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 cursor-grab active:cursor-grabbing group transition-all hover:border-indigo-400"
                             draggable="true" @dragstart.stop="dragStart($event, colIndex, task.id)">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex flex-wrap gap-1">
                                    <span :class="priorityClass(task.priority)" x-text="task.priority"></span>
                                    <template x-if="task.deadline">
                                        <span :class="deadlineClass(task.deadline)" class="px-2 py-0.5 rounded text-[10px] font-bold" x-text="formatDate(task.deadline)"></span>
                                    </template>
                                </div>
                                <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click="openEditModal(colIndex, task)" class="text-slate-400 hover:text-indigo-500 text-xs font-bold uppercase">Edit</button>
                                    <button @click="confirmDelete(colIndex, task.id)" class="text-slate-400 hover:text-red-500 text-lg leading-none">&times;</button>
                                </div>
                            </div>
                            <p class="text-sm font-medium text-slate-700 dark:text-slate-200 break-words whitespace-pre-wrap mb-2" x-text="task.content"></p>
                            <template x-if="task.checklists && task.checklists.length > 0">
                                <div class="mt-2 pt-2 border-t dark:border-slate-700">
                                    <div class="w-full bg-slate-100 dark:bg-slate-700 h-1 rounded-full overflow-hidden">
                                        <div class="bg-indigo-500 h-full transition-all" :style="'width:' + (completedCount(task)/task.checklists.length)*100 + '%'"></div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <button @click="column.isAdding = true" x-show="!column.isAdding" class="w-full py-2 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg text-slate-400 text-sm hover:border-indigo-400 hover:text-indigo-500 transition-all">+ Add Task</button>
                    <div x-show="column.isAdding" x-cloak class="bg-white dark:bg-slate-800 p-3 rounded-lg shadow-md border border-indigo-200 dark:border-indigo-900 space-y-3">
                        <textarea x-model="newTaskContent" class="w-full text-sm p-2 border border-slate-200 dark:border-slate-700 dark:bg-slate-900 rounded outline-none focus:ring-2 focus:ring-indigo-500 dark:text-slate-200" placeholder="Task description..."></textarea>
                        <div class="space-y-1">
                            <template x-for="(st, i) in newTaskSubtasks" :key="i">
                                <div class="flex gap-1 items-center">
                                    <input type="text" x-model="newTaskSubtasks[i].text" class="flex-1 text-[10px] bg-slate-50 dark:bg-slate-900 border-none rounded py-1 px-2 dark:text-slate-300" placeholder="Sub-task...">
                                    <button @click="newTaskSubtasks.splice(i,1)" class="text-slate-300 hover:text-red-500 text-xs">&times;</button>
                                </div>
                            </template>
                            <button @click="newTaskSubtasks.push({text:'', done:false})" class="text-[10px] text-indigo-500 font-bold hover:underline">+ Add Sub-task</button>
                        </div>
                        <div class="flex gap-2 items-center">
                            <select x-model="newTaskPriority" class="text-xs border dark:border-slate-700 dark:bg-slate-900 rounded px-1 dark:text-slate-300">
                                <option value="low">Low</option><option value="med">Med</option><option value="high">High</option>
                            </select>
                            <div class="flex-grow"></div>
                            <button @click="addTask(colIndex)" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs hover:bg-indigo-700">Save</button>
                            <button @click="cancelAddTask(colIndex)" class="text-slate-400 text-xs hover:text-slate-600">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <div x-show="isEditModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col max-h-[90vh]" @click.away="closeEditModal()">
            <div class="p-6 overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold dark:text-white">Edit Task</h3>
                    <div class="flex gap-4">
                        <input type="date" x-model="editingTask.deadline" class="text-xs border dark:border-slate-700 dark:bg-slate-800 rounded px-2 py-1 dark:text-white">
                        <select x-model="editingTask.priority" class="text-xs border dark:border-slate-700 dark:bg-slate-800 rounded px-2 py-1 dark:text-slate-300">
                            <option value="low">Low</option><option value="med">Med</option><option value="high">High</option>
                        </select>
                    </div>
                </div>
                <textarea x-model="editingTask.content" class="w-full h-24 text-sm p-3 border border-slate-200 dark:border-slate-700 dark:bg-slate-800 rounded-lg mb-4 dark:text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                <div class="mb-4">
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2">Checklist Items</label>
                    <div class="space-y-2 mb-3">
                        <template x-for="(item, index) in editingTask.checklists" :key="index">
                            <div class="flex items-center gap-2 group">
                                <input type="checkbox" x-model="item.done" class="rounded border-slate-300 text-indigo-600">
                                <input type="text" x-model="item.text" class="flex-1 bg-transparent border-none text-sm dark:text-slate-200 outline-none">
                                <button @click="editingTask.checklists.splice(index, 1)" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100">&times;</button>
                            </div>
                        </template>
                    </div>
                    <button @click="editingTask.checklists.push({text: '', done: false})" class="text-xs text-indigo-500 font-bold hover:underline">+ Add Sub-task</button>
                </div>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3 border-t dark:border-slate-700">
                <button @click="closeEditModal()" class="text-slate-500 hover:text-slate-700 text-sm font-medium">Cancel</button>
                <button @click="saveEdit()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        function kanbanApp() {
            return {
                columns: [],
                darkMode: false,
                searchQuery: '',
                newTaskContent: '',
                newTaskPriority: 'med',
                newTaskSubtasks: [],
                isEditModalOpen: false,
                editingTask: { id: null, content: '', priority: '', deadline: '', checklists: [], colIndex: null },
                dragInfo: null,
                colDragIndex: null,

                init() {
                    const savedData = localStorage.getItem('kanban_pro_v3');
                    const savedTheme = localStorage.getItem('kanban_theme_v3');
                    if (savedData) {
                        this.columns = JSON.parse(savedData);
                    } else {
                        this.resetToDefault(false);
                    }
                    if (savedTheme !== null) this.darkMode = JSON.parse(savedTheme);
                },

                save() {
                    localStorage.setItem('kanban_pro_v3', JSON.stringify(this.columns));
                    localStorage.setItem('kanban_theme_v3', JSON.stringify(this.darkMode));
                },

                resetToDefault(confirmAction = true) {
                    if (confirmAction && !confirm("Reset layout to default To-Do, In Progress, Done?")) return;
                    this.columns = [
                        { id: 1, name: 'To Do', tasks: [], isAdding: false },
                        { id: 2, name: 'In Progress', tasks: [], isAdding: false },
                        { id: 3, name: 'Done', tasks: [], isAdding: false }
                    ];
                    this.save();
                },

                addColumn() {
                    const name = prompt("Column Name:", "New Column");
                    if (name) {
                        this.columns.push({ id: Date.now(), name: name, tasks: [], isAdding: false });
                        this.save();
                    }
                },

                // Task Drag Logic
                dragStart(e, colIdx, id) { 
                    this.dragInfo = { colIndex: colIdx, taskId: id }; 
                    e.dataTransfer.setData('type', 'task');
                },
                drop(e, targetIdx) {
                    if (!this.dragInfo) return;
                    const { colIndex, taskId } = this.dragInfo;
                    const idx = this.columns[colIndex].tasks.findIndex(t => t.id === taskId);
                    const task = this.columns[colIndex].tasks.splice(idx, 1)[0];
                    this.columns[targetIdx].tasks.push(task);
                    this.save();
                    this.dragInfo = null;
                },

                // Column Drag Logic
                colDragStart(e, idx) {
                    this.colDragIndex = idx;
                    e.dataTransfer.setData('type', 'column');
                },
                colDrop(e, targetIdx) {
                    if (this.colDragIndex === null) return;
                    const col = this.columns.splice(this.colDragIndex, 1)[0];
                    this.columns.splice(targetIdx, 0, col);
                    this.save();
                    this.colDragIndex = null;
                },

                addTask(colIndex) {
                    if (!this.newTaskContent.trim()) return;
                    this.columns[colIndex].tasks.push({ 
                        id: Date.now(), 
                        content: this.newTaskContent, 
                        priority: this.newTaskPriority,
                        deadline: '',
                        checklists: this.newTaskSubtasks.filter(s => s.text.trim() !== '')
                    });
                    this.cancelAddTask(colIndex);
                    this.save();
                },

                cancelAddTask(colIndex) {
                    this.newTaskContent = '';
                    this.newTaskSubtasks = [];
                    this.columns[colIndex].isAdding = false;
                },

                confirmDeleteColumn(idx) {
                    if (confirm(`Delete column "${this.columns[idx].name}"?`)) {
                        this.columns.splice(idx, 1);
                        this.save();
                    }
                },

                confirmDelete(colIdx, id) {
                    if (confirm("Delete this task?")) {
                        this.columns[colIdx].tasks = this.columns[colIdx].tasks.filter(t => t.id !== id);
                        this.save();
                    }
                },

                confirmClearColumn(colIdx) {
                    if (confirm("Clear tasks in this column?")) {
                        this.columns[colIdx].tasks = [];
                        this.save();
                    }
                },

                sortColumn(colIndex) {
                    const pMap = { high: 1, med: 2, low: 3 };
                    this.columns[colIndex].tasks.sort((a, b) => pMap[a.priority] - pMap[b.priority]);
                    this.save();
                },

                filteredTasks(tasks) {
                    if (!this.searchQuery) return tasks;
                    return tasks.filter(t => t.content.toLowerCase().includes(this.searchQuery.toLowerCase()));
                },

                toggleTheme() { this.darkMode = !this.darkMode; this.save(); },
                priorityClass(p) {
                    const base = "px-2 py-0.5 rounded text-[10px] font-bold uppercase ";
                    if (p === 'high') return base + "bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400";
                    if (p === 'med') return base + "bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400";
                    return base + "bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-400";
                },
                deadlineClass(d) {
                    const overdue = new Date(d) < new Date().setHours(0,0,0,0);
                    return overdue ? "bg-red-500 text-white" : "bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400";
                },
                formatDate(d) { return d.split('-').slice(1).join('/'); },
                completedCount(t) { return t.checklists.filter(c => c.done).length; },
                openEditModal(colIndex, task) {
                    this.editingTask = { ...JSON.parse(JSON.stringify(task)), colIndex };
                    this.isEditModalOpen = true;
                },
                closeEditModal() { this.isEditModalOpen = false; },
                saveEdit() {
                    const col = this.columns[this.editingTask.colIndex];
                    const idx = col.tasks.findIndex(t => t.id === this.editingTask.id);
                    if (idx !== -1) { col.tasks[idx] = { ...this.editingTask }; this.save(); }
                    this.closeEditModal();
                },
                exportData() {
                    const blob = new Blob([JSON.stringify(this.columns)], { type: 'application/json' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `kanban-export.json`;
                    link.click();
                },
                importData(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) { this.columns = imported; this.save(); }
                    };
                    reader.readAsText(file);
                }
            }
        }
    </script>
</body>
</html>
