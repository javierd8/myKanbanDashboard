<!DOCTYPE html>
<html lang="en" x-data="kanbanApp()" :class="{ 'dark': darkMode }" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Kanban | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .dark body { background-color: #0f172a; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:text-slate-100 font-sans antialiased transition-colors duration-300">

    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">Zenith Kanban</h1>
        
        <div class="flex items-center gap-4">
            <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span x-show="!darkMode">🌙</span>
                <span x-show="darkMode" x-cloak>☀️</span>
            </button>

            <div class="flex gap-2 border-l dark:border-slate-700 pl-4">
                <label class="cursor-pointer px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-md text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700">
                    Import
                    <input type="file" class="hidden" @change="importData($event)">
                </label>
                <button @click="exportData()" class="px-3 py-1 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700">Export</button>
            </div>
        </div>
    </header>

    <main class="p-6 h-[calc(100vh-72px)] overflow-x-auto flex gap-6 items-start">
        <template x-for="(column, colIndex) in columns" :key="column.id">
            <div class="flex-shrink-0 w-80 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl p-4 flex flex-col max-h-full border border-transparent dark:border-slate-700">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider text-sm" x-text="column.name"></h2>
                    <span class="bg-white dark:bg-slate-700 px-2 py-0.5 rounded text-xs font-bold text-slate-400" x-text="column.tasks.length"></span>
                </div>

                <div class="space-y-3 overflow-y-auto flex-grow min-h-[100px]" @dragover.prevent @drop="drop($event, colIndex)">
                    <template x-for="(task, taskIndex) in column.tasks" :key="task.id">
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 cursor-grab active:cursor-grabbing group"
                             draggable="true" @dragstart="dragStart($event, colIndex, taskIndex)">
                            
                            <div class="flex justify-between items-start mb-2">
                                <span :class="{
                                    'px-2 py-0.5 rounded text-[10px] font-bold uppercase': true,
                                    'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400': task.priority === 'high',
                                    'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400': task.priority === 'med',
                                    'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-400': task.priority === 'low'
                                }" x-text="task.priority"></span>
                                <button @click="deleteTask(colIndex, taskIndex)" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-opacity">&times;</button>
                            </div>
                            <p class="text-sm font-medium text-slate-700 dark:text-slate-200" x-text="task.content"></p>
                        </div>
                    </template>

                    <button @click="column.isAdding = true" x-show="!column.isAdding" 
                            class="w-full py-2 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg text-slate-400 text-sm hover:border-indigo-400 hover:text-indigo-500 transition-all">
                        + Add Task
                    </button>

                    <div x-show="column.isAdding" x-cloak class="bg-white dark:bg-slate-800 p-3 rounded-lg shadow-md border border-indigo-200 dark:border-indigo-900">
                        <textarea x-model="newTaskContent" class="w-full text-sm p-2 border border-slate-200 dark:border-slate-700 dark:bg-slate-900 rounded mb-2 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Task description..."></textarea>
                        <div class="flex gap-2">
                            <select x-model="newTaskPriority" class="text-xs border dark:border-slate-700 dark:bg-slate-900 rounded px-1">
                                <option value="low">Low</option>
                                <option value="med">Med</option>
                                <option value="high">High</option>
                            </select>
                            <button @click="addTask(colIndex)" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs hover:bg-indigo-700">Save</button>
                            <button @click="column.isAdding = false" class="text-slate-400 text-xs hover:text-slate-600">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <script>
        function kanbanApp() {
            return {
                columns: [
                    { id: 1, name: 'To Do', tasks: [], isAdding: false },
                    { id: 2, name: 'In Progress', tasks: [], isAdding: false },
                    { id: 3, name: 'Done', tasks: [], isAdding: false }
                ],
                darkMode: false,
                newTaskContent: '',
                newTaskPriority: 'med',
                draggedTask: null,

                init() {
                    const savedData = localStorage.getItem('zenith_data');
                    const savedTheme = localStorage.getItem('zenith_theme');
                    if (savedData) this.columns = JSON.parse(savedData);
                    if (savedTheme) this.darkMode = JSON.parse(savedTheme);
                },

                save() {
                    localStorage.setItem('zenith_data', JSON.stringify(this.columns));
                    localStorage.setItem('zenith_theme', JSON.stringify(this.darkMode));
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    this.save();
                },

                addTask(colIndex) {
                    if (!this.newTaskContent.trim()) return;
                    this.columns[colIndex].tasks.push({
                        id: Date.now(),
                        content: this.newTaskContent,
                        priority: this.newTaskPriority
                    });
                    this.newTaskContent = '';
                    this.columns[colIndex].isAdding = false;
                    this.save();
                },

                deleteTask(colIndex, taskIndex) {
                    this.columns[colIndex].tasks.splice(taskIndex, 1);
                    this.save();
                },

                dragStart(e, colIndex, taskIndex) {
                    this.draggedTask = { colIndex, taskIndex };
                },

                drop(e, targetColIndex) {
                    const { colIndex, taskIndex } = this.draggedTask;
                    const task = this.columns[colIndex].tasks.splice(taskIndex, 1)[0];
                    this.columns[targetColIndex].tasks.push(task);
                    this.save();
                },

                exportData() {
                    const blob = new Blob([JSON.stringify(this.columns)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `kanban-backup-${new Date().toISOString().split('T')[0]}.json`;
                    link.click();
                },

                importData(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const imported = JSON.parse(e.target.result);
                            if (Array.isArray(imported)) {
                                this.columns = imported;
                                this.save();
                                alert("Data imported successfully!");
                            }
                        } catch (err) {
                            alert("Invalid JSON file.");
                        }
                    };
                    reader.readAsText(file);
                }
            }
        }
    </script>
</body>
</html>
